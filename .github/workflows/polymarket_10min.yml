name: polymarket-10min-pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r project6_polymarket/requirements.txt

      - name: Run snapshot pipeline
        run: |
          cd project6_polymarket
          python scripts/polymarket_pipeline.py --once
          python scripts/build_daily_features.py

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-data-${{ github.run_id }}
          path: |
            project6_polymarket/data/market_snapshots.csv
            project6_polymarket/data/watchlist_current.csv
            project6_polymarket/data/market_mapping.csv
            project6_polymarket/data/daily_features.csv
          if-no-files-found: error
