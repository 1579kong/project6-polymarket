name: polymarket-10min-pipeline

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run snapshot pipeline
        run: |
          python scripts/polymarket_pipeline.py --once --lookback-minutes 12
          python scripts/build_daily_features.py

      - name: Upload CSV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: polymarket-data-${{ github.run_id }}
          path: |
            data/market_snapshots.csv
            data/watchlist_current.csv
            data/market_mapping.csv
            data/daily_features.csv
          if-no-files-found: error
